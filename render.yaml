services:
  - type: web
    name: frontend
    env: docker
    repo: https://github.com/benschaffnit-oss/company-chatbot-demo-full
    branch: main
    dockerfilePath: frontend/Dockerfile
    port: 8501
    healthCheckPath: /
    plan: free

  - type: web
    name: backend
    env: docker
    repo: https://github.com/benschaffnit-oss/company-chatbot-demo-full
    branch: main
    dockerfilePath: backend/Dockerfile
    port: 8000
    healthCheckPath: /
    plan: free

  - type: worker
    name: qdrant
    env: docker
    image: qdrant/qdrant:latest  # Use official image instead of Dockerfile if you don't have one
    plan: free
